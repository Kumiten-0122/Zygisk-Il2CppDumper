name: Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 11
        cache: gradle

    - name: Build
      run: |
        chmod +x ./gradlew

        PKG="${{ github.event.inputs.package_name }}"

        if [ -n "$PKG" ]; then
          sed -i "s/moduleDescription = \"/moduleDescription = \"($PKG) /g" module.gradle
          sed -i "s/com.game.packagename/$PKG/g" module/src/main/cpp/game.h
        fi

        ./gradlew :module:assembleRelease

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/